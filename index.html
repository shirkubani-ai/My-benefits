<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>הטבות וקופונים</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f1f5f9; }
  .card-expire { animation: pulse-red 2s infinite; }
  @keyframes pulse-red { 0%,100%{background-color:#fef2f2} 50%{background-color:#fee2e2} }
  #modal-img { max-height: 80vh; object-fit: contain; }
  .spinner { border: 3px solid #e2e8f0; border-top-color: #6366f1; border-radius: 50%; width: 32px; height: 32px; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body class="min-h-screen">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy, where }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getAuth, onAuthStateChanged, signOut,
           createUserWithEmailAndPassword, signInWithEmailAndPassword,
           GoogleAuthProvider, signInWithPopup }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD6XPRYOuiiTdOlXafhhURDoh2ZpKS9zzY",
    authDomain: "my-benefits-ede9d.firebaseapp.com",
    projectId: "my-benefits-ede9d",
    storageBucket: "my-benefits-ede9d.firebasestorage.app",
    messagingSenderId: "844987649412",
    appId: "1:844987649412:web:b335e22177d8a6efbca1d1"
  };

  const app  = initializeApp(firebaseConfig);
  const db   = getFirestore(app);
  const auth = getAuth(app);
  const googleProvider = new GoogleAuthProvider();

  const CAT_ICONS = {
    "סופר":"🛒","מסעדות":"🍽️","אופנה":"👗","דלק":"⛽","בריאות ויופי":"💄",
    "ספורט":"🏋️","אלקטרוניקה":"📱","בידור":"🎬","תיירות":"✈️",
    "קפה ומאפים":"☕","חיות מחמד":"🐾","ילדים וצעצועים":"🧸",
    "ריהוט ובית":"🛋️","רכב":"🚗","אחר":"🎟️"
  };
  const CATEGORIES = Object.keys(CAT_ICONS);

  // views
  const authView  = document.getElementById('auth-view');
  const mainView  = document.getElementById('main-view');
  const homeView  = document.getElementById('home-view');
  const catView   = document.getElementById('cat-view');
  const allView   = document.getElementById('all-view');
  const addView   = document.getElementById('add-view');
  const modal     = document.getElementById('modal');
  const modalImg  = document.getElementById('modal-img');

  // auth
  const authTitle  = document.getElementById('auth-title');
  const emailInp   = document.getElementById('email-inp');
  const passInp    = document.getElementById('pass-inp');
  const authBtn    = document.getElementById('auth-btn');
  const authSwitch = document.getElementById('auth-switch');
  const googleBtn  = document.getElementById('google-btn');
  const authErr    = document.getElementById('auth-err');

  const catSelect  = document.getElementById('cat-select');
  const imgInput   = document.getElementById('img-input');
  const imgPreview = document.getElementById('img-preview');
  const saveBtn    = document.getElementById('save-btn');
  const saveLbl    = document.getElementById('save-lbl');
  const saveSpin   = document.getElementById('save-spin');

  let benefits = [];
  let selectedBase64 = null;
  let isRegister = false;
  let currentUid = null;

  // populate cat select in add form
  CATEGORIES.forEach(c => {
    const o = document.createElement('option');
    o.value = o.textContent = c;
    catSelect.appendChild(o);
  });

  // ── auth state ──
  onAuthStateChanged(auth, user => {
    if (user) {
      currentUid = user.uid;
      authView.classList.add('hidden');
      mainView.classList.remove('hidden');
      loadBenefits();
    } else {
      currentUid = null;
      authView.classList.remove('hidden');
      mainView.classList.add('hidden');
    }
  });

  authSwitch.onclick = () => {
    isRegister = !isRegister;
    authTitle.textContent = isRegister ? 'הרשמה' : 'כניסה';
    authBtn.textContent   = isRegister ? 'הרשמה' : 'כניסה';
    authSwitch.textContent = isRegister ? 'יש לי כבר חשבון — כניסה' : 'אין לי חשבון — הרשמה';
    authErr.textContent = '';
  };

  authBtn.onclick = async () => {
    const email = emailInp.value.trim(), pass = passInp.value;
    authErr.textContent = '';
    try {
      isRegister
        ? await createUserWithEmailAndPassword(auth, email, pass)
        : await signInWithEmailAndPassword(auth, email, pass);
    } catch(e) { authErr.textContent = translateError(e.code); }
  };

  googleBtn.onclick = async () => {
    authErr.textContent = '';
    try { await signInWithPopup(auth, googleProvider); }
    catch(e) { authErr.textContent = translateError(e.code); }
  };

  document.getElementById('signout-btn').onclick = () => signOut(auth);

  function translateError(code) {
    const m = {
      'auth/invalid-email':'כתובת מייל לא תקינה',
      'auth/user-not-found':'משתמש לא נמצא',
      'auth/wrong-password':'סיסמא שגויה',
      'auth/email-already-in-use':'המייל כבר רשום',
      'auth/weak-password':'הסיסמא חייבת להכיל לפחות 6 תווים',
      'auth/popup-closed-by-user':'החלון נסגר לפני הכניסה',
    };
    return m[code] || 'שגיאה — נסי שוב';
  }

  // ── compress ──
  function compressToBase64(file, maxW=800) {
    return new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          const ratio = Math.min(1, maxW/img.width);
          const canvas = document.createElement('canvas');
          canvas.width = img.width*ratio; canvas.height = img.height*ratio;
          canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
          resolve(canvas.toDataURL('image/jpeg',0.75));
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  imgInput.addEventListener('change', async e => {
    const file = e.target.files[0]; if(!file) return;
    imgPreview.src = URL.createObjectURL(file);
    imgPreview.classList.remove('hidden');
    selectedBase64 = await compressToBase64(file);
  });

  // ── navigation ──
  function showMain(v) {
    homeView.classList.toggle('hidden', v!=='home');
    catView.classList.toggle('hidden',  v!=='cat');
    allView.classList.toggle('hidden',  v!=='all');
    addView.classList.toggle('hidden',  v!=='add');
    if(v==='add') resetForm();
  }

  document.getElementById('btn-add').onclick    = () => showMain('add');
  document.getElementById('btn-back-cat').onclick = () => showMain('home');
  document.getElementById('btn-back-all').onclick = () => showMain('home');
  document.getElementById('btn-back-add').onclick = () => showMain('home');
  document.getElementById('btn-show-all').onclick = () => { renderAllView(); showMain('all'); };

  function resetForm() {
    document.getElementById('name-inp').value = '';
    catSelect.selectedIndex = 0;
    document.getElementById('expire-inp').value = '';
    imgPreview.classList.add('hidden'); imgPreview.src='';
    selectedBase64=null; imgInput.value='';
  }

  // ── save ──
  saveBtn.onclick = async () => {
    const name   = document.getElementById('name-inp').value.trim();
    const cat    = catSelect.value;
    const expire = document.getElementById('expire-inp').value;
    if(!name||!expire){alert('נא למלא שם ותאריך תפוגה');return;}
    saveBtn.disabled=true; saveLbl.textContent='שומר…'; saveSpin.classList.remove('hidden');
    try {
      await addDoc(collection(db,'benefits'),{name,cat,expire,imgBase64:selectedBase64||'',uid:currentUid,created:Date.now()});
      await loadBenefits();
      showMain('home');
    } catch(err){alert('שגיאה בשמירה: '+err.message);}
    finally{saveBtn.disabled=false;saveLbl.textContent='שמור הטבה';saveSpin.classList.add('hidden');}
  };

  // ── load ──
  async function loadBenefits() {
    document.getElementById('home-spinner').classList.remove('hidden');
    try {
      const q = query(collection(db,'benefits'),where('uid','==',currentUid),orderBy('created','desc'));
      const snap = await getDocs(q);
      benefits = snap.docs.map(d=>({id:d.id,...d.data()}));
      renderHome();
    } catch(e){
      document.getElementById('home-spinner').textContent='שגיאה: '+e.message;
    } finally {
      document.getElementById('home-spinner').classList.add('hidden');
    }
  }

  // ── home: category grid ──
  function renderHome() {
    const grid = document.getElementById('cat-grid');
    grid.innerHTML='';
    const now=Date.now(), soon=48*60*60*1000;

    // count per category
    const counts={}, urgents={};
    benefits.forEach(b=>{
      counts[b.cat]=(counts[b.cat]||0)+1;
      const diff=new Date(b.expire).getTime()-now;
      if(diff>0&&diff<soon) urgents[b.cat]=(urgents[b.cat]||0)+1;
    });

    const activeCats = CATEGORIES.filter(c=>counts[c]);
    if(!activeCats.length){
      grid.innerHTML='<p class="col-span-2 text-center text-gray-400 mt-8 text-sm">אין הטבות עדיין.<br/>לחץ על + הוסף כדי להתחיל 🎉</p>';
      return;
    }

    activeCats.forEach(c=>{
      const urgent = urgents[c]||0;
      const div=document.createElement('div');
      div.className='bg-white rounded-2xl shadow p-4 flex flex-col items-center gap-2 cursor-pointer hover:scale-[1.03] transition active:scale-95';
      div.innerHTML=`
        <span class="text-4xl">${CAT_ICONS[c]}</span>
        <span class="font-bold text-gray-700 text-sm text-center">${c}</span>
        <span class="text-xs text-gray-400">${counts[c]} הטבות</span>
        ${urgent?`<span class="text-xs bg-red-100 text-red-500 rounded-full px-2 py-0.5 font-bold">⚠️ ${urgent} פגות בקרוב</span>`:''}
      `;
      div.onclick=()=>{ renderCatView(c); showMain('cat'); };
      grid.appendChild(div);
    });
  }

  // ── category view ──
  function renderCatView(cat) {
    document.getElementById('cat-title').textContent = CAT_ICONS[cat]+' '+cat;
    const list=benefits.filter(b=>b.cat===cat);
    const searchEl=document.getElementById('cat-search');
    searchEl.value='';
    searchEl.oninput=()=>{
      const q=searchEl.value.trim().toLowerCase();
      renderCards(document.getElementById('cat-cards'), q?list.filter(b=>b.name.toLowerCase().includes(q)):list);
    };
    renderCards(document.getElementById('cat-cards'),list);
  }

  // ── all view ──
  function renderAllView() {
    const searchEl=document.getElementById('all-search');
    searchEl.value='';
    searchEl.oninput=()=>{
      const q=searchEl.value.trim().toLowerCase();
      renderCards(document.getElementById('all-cards'), q?benefits.filter(b=>b.name.toLowerCase().includes(q)):benefits);
    };
    renderCards(document.getElementById('all-cards'),benefits);
  }

  // ── render cards ──
  function renderCards(container, list) {
    container.innerHTML='';
    const now=Date.now(),soon=48*60*60*1000;
    if(!list.length){container.innerHTML='<p class="text-center text-gray-400 text-sm mt-8">אין הטבות</p>';return;}

    list.forEach(b=>{
      const diff=new Date(b.expire).getTime()-now;
      const urgent=diff>0&&diff<soon, expired=diff<0;
      const card=document.createElement('div');
      card.className=`rounded-2xl shadow p-4 flex flex-col gap-2 cursor-pointer transition hover:scale-[1.02]
        ${urgent?'card-expire border-2 border-red-400':expired?'bg-gray-100 opacity-60':'bg-white'}`;
      const dateStr=new Date(b.expire).toLocaleDateString('he-IL');
      const badge=urgent
        ?`<span class="text-xs bg-red-100 text-red-600 rounded-full px-2 py-0.5 font-bold">⚠️ פג בקרוב!</span>`
        :expired?`<span class="text-xs bg-gray-200 text-gray-500 rounded-full px-2 py-0.5">פג תוקף</span>`:'';
      card.innerHTML=`
        ${b.imgBase64
          ?`<img src="${b.imgBase64}" alt="ברקוד" class="w-full h-36 object-contain rounded-xl bg-gray-50"/>`
          :`<div class="w-full h-24 flex items-center justify-center bg-gray-100 rounded-xl text-4xl">${CAT_ICONS[b.cat]||'🎟️'}</div>`}
        <div class="flex items-center justify-between gap-1 flex-wrap">
          <span class="font-bold text-gray-800 text-base">${b.name}</span>${badge}
        </div>
        <div class="flex items-center justify-between text-sm text-gray-500">
          <span class="bg-indigo-50 text-indigo-700 rounded-full px-2 py-0.5 text-xs">${b.cat}</span>
          <span>תפוגה: ${dateStr}</span>
        </div>
        <button data-id="${b.id}" class="delete-btn mt-1 text-xs text-red-400 hover:text-red-600 self-end">🗑 מחק</button>
      `;
      if(b.imgBase64) card.addEventListener('click',e=>{if(e.target.classList.contains('delete-btn'))return;openModal(b.imgBase64);});
      container.appendChild(card);
    });

    container.querySelectorAll('.delete-btn').forEach(btn=>{
      btn.onclick=async e=>{
        e.stopPropagation();
        if(!confirm('למחוק הטבה זו?'))return;
        try{await deleteDoc(doc(db,'benefits',btn.dataset.id));await loadBenefits();}
        catch{alert('שגיאה במחיקה');}
      };
    });
  }

  // ── modal ──
  function openModal(src){modalImg.src=src;modal.classList.remove('hidden');}
  document.getElementById('modal-close').onclick=()=>modal.classList.add('hidden');
  modal.addEventListener('click',e=>{if(e.target===modal)modal.classList.add('hidden');});
</script>

<!-- ══ AUTH ══ -->
<div id="auth-view" class="min-h-screen flex items-center justify-center px-4">
  <div class="bg-white rounded-2xl shadow-lg p-6 w-full max-w-sm flex flex-col gap-4">
    <h1 class="text-xl font-bold text-center text-indigo-600">🎟️ ההטבות שלי</h1>
    <h2 id="auth-title" class="text-base font-bold text-gray-700 text-center">כניסה</h2>
    <button id="google-btn" class="w-full flex items-center justify-center gap-2 border border-gray-300 rounded-xl py-2.5 text-sm font-medium hover:bg-gray-50 transition">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5"/>כניסה עם Google
    </button>
    <div class="flex items-center gap-2"><div class="flex-1 h-px bg-gray-200"></div><span class="text-gray-400 text-xs">או</span><div class="flex-1 h-px bg-gray-200"></div></div>
    <input id="email-inp" type="email" placeholder="כתובת מייל" class="w-full rounded-xl border border-gray-200 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"/>
    <input id="pass-inp" type="password" placeholder="סיסמא" class="w-full rounded-xl border border-gray-200 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"/>
    <p id="auth-err" class="text-red-500 text-xs text-center min-h-[16px]"></p>
    <button id="auth-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-xl transition">כניסה</button>
    <button id="auth-switch" class="text-indigo-500 text-xs text-center hover:underline">אין לי חשבון — הרשמה</button>
  </div>
</div>

<!-- ══ MAIN ══ -->
<div id="main-view" class="hidden min-h-screen">
  <header class="bg-indigo-600 text-white px-4 py-3 flex items-center justify-between shadow-lg sticky top-0 z-10">
    <h1 class="text-lg font-bold">🎟️ ההטבות שלי</h1>
    <div class="flex items-center gap-2">
      <button id="btn-add" class="bg-white text-indigo-600 text-sm font-bold px-3 py-1.5 rounded-xl shadow hover:bg-indigo-50 transition">+ הוסף</button>
      <button id="signout-btn" class="text-indigo-200 text-xs hover:text-white">יציאה</button>
    </div>
  </header>

  <!-- HOME: category grid -->
  <div id="home-view" class="px-4 py-4 max-w-lg mx-auto">
    <div class="flex justify-between items-center mb-4">
      <h2 class="font-bold text-gray-700 text-base">הקטגוריות שלי</h2>
      <button id="btn-show-all" class="text-indigo-500 text-sm hover:underline">כל ההטבות ←</button>
    </div>
    <div id="home-spinner" class="hidden flex justify-center py-8"><div class="spinner"></div></div>
    <div id="cat-grid" class="grid grid-cols-2 gap-3"></div>
  </div>

  <!-- CAT VIEW -->
  <div id="cat-view" class="hidden px-4 py-4 max-w-lg mx-auto">
    <div class="flex items-center gap-2 mb-4">
      <button id="btn-back-cat" class="text-indigo-500 text-sm hover:underline">← חזור</button>
      <h2 id="cat-title" class="font-bold text-gray-700 text-base"></h2>
    </div>
    <input id="cat-search" type="search" placeholder="🔍 חיפוש…" class="w-full rounded-xl border border-gray-200 bg-white px-4 py-2.5 text-sm shadow-sm mb-4 focus:outline-none focus:ring-2 focus:ring-indigo-300"/>
    <div id="cat-cards" class="grid grid-cols-1 gap-4"></div>
  </div>

  <!-- ALL VIEW -->
  <div id="all-view" class="hidden px-4 py-4 max-w-lg mx-auto">
    <div class="flex items-center gap-2 mb-4">
      <button id="btn-back-all" class="text-indigo-500 text-sm hover:underline">← חזור</button>
      <h2 class="font-bold text-gray-700 text-base">כל ההטבות</h2>
    </div>
    <input id="all-search" type="search" placeholder="🔍 חיפוש…" class="w-full rounded-xl border border-gray-200 bg-white px-4 py-2.5 text-sm shadow-sm mb-4 focus:outline-none focus:ring-2 focus:ring-indigo-300"/>
    <div id="all-cards" class="grid grid-cols-1 gap-4"></div>
  </div>

  <!-- ADD VIEW -->
  <div id="add-view" class="hidden px-4 py-4 max-w-lg mx-auto">
    <div class="bg-white rounded-2xl shadow p-5 flex flex-col gap-4">
      <div class="flex items-center gap-2 mb-1">
        <button id="btn-back-add" class="text-indigo-500 text-sm hover:underline">← חזור</button>
        <h2 class="font-bold text-gray-700 text-base">הוספת הטבה חדשה</h2>
      </div>
      <div>
        <label class="text-sm font-medium text-gray-600 block mb-1">שם המותג / ההטבה *</label>
        <input id="name-inp" type="text" placeholder="לדוגמה: רמי לוי" class="w-full rounded-xl border border-gray-200 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"/>
      </div>
      <div>
        <label class="text-sm font-medium text-gray-600 block mb-1">קטגוריה</label>
        <select id="cat-select" class="w-full rounded-xl border border-gray-200 px-4 py-2.5 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-indigo-300"></select>
      </div>
      <div>
        <label class="text-sm font-medium text-gray-600 block mb-1">תאריך תפוגה *</label>
        <input id="expire-inp" type="date" class="w-full rounded-xl border border-gray-200 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"/>
      </div>
      <div>
        <label class="text-sm font-medium text-gray-600 block mb-1">תמונת ברקוד / קופון</label>
        <label class="flex items-center justify-center gap-2 w-full border-2 border-dashed border-indigo-200 rounded-xl py-4 cursor-pointer hover:bg-indigo-50 transition text-sm text-indigo-500 font-medium">
          📷 העלה תמונה או צלם
          <input id="img-input" type="file" accept="image/*" capture="environment" class="hidden"/>
        </label>
        <img id="img-preview" class="hidden mt-3 w-full max-h-48 object-contain rounded-xl border border-gray-100"/>
      </div>
      <button id="save-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2 transition mt-1">
        <span id="save-lbl">שמור הטבה</span>
        <div id="save-spin" class="hidden w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
      </button>
    </div>
  </div>
</div>

<!-- Modal -->
<div id="modal" class="hidden fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4">
  <div class="relative max-w-sm w-full">
    <button id="modal-close" class="absolute -top-10 left-0 text-white text-3xl leading-none">&times;</button>
    <img id="modal-img" src="" alt="ברקוד" class="w-full rounded-2xl shadow-2xl bg-white"/>
    <p class="text-center text-white/70 text-xs mt-3">הצג את המסך לסריקה בקופה</p>
  </div>
</div>

</body>
</html>
