<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>הטבות וקופונים</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f1f5f9; }
  .card-expire { animation: pulse-red 2s infinite; }
  @keyframes pulse-red { 0%,100%{background-color:#fef2f2} 50%{background-color:#fee2e2} }
  #modal-img { max-height: 80vh; object-fit: contain; }
  .spinner { border: 3px solid #e2e8f0; border-top-color: #6366f1; border-radius: 50%; width: 32px; height: 32px; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body class="min-h-screen">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ▼▼▼ הדבק כאן את ה-firebaseConfig מה-Firebase Console שלך ▼▼▼
  const firebaseConfig = {
    apiKey: "AIzaSyD6XPRYOuiiTdOlXafhhURDoh2ZpKS9zzY",
    authDomain: "my-benefits-ede9d.firebaseapp.com",
    projectId: "my-benefits-ede9d",
    storageBucket: "my-benefits-ede9d.firebasestorage.app",
    messagingSenderId: "844987649412",
    appId: "1:844987649412:web:b335e22177d8a6efbca1d1"
  };
  // ▲▲▲ סוף אזור ה-Config ▲▲▲

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  const CATEGORIES = [
    "סופר","מסעדות","אופנה","דלק","בריאות ויופי",
    "ספורט","אלקטרוניקה","בידור","תיירות",
    "קפה ומאפים","חיות מחמד","ילדים וצעצועים",
    "ריהוט ובית","רכב","אחר"
  ];

  const listView   = document.getElementById('list-view');
  const addView    = document.getElementById('add-view');
  const modal      = document.getElementById('modal');
  const modalImg   = document.getElementById('modal-img');
  const searchInp  = document.getElementById('search');
  const cardGrid   = document.getElementById('card-grid');
  const emptyMsg   = document.getElementById('empty-msg');
  const spinner    = document.getElementById('spinner');
  const catSelect  = document.getElementById('cat-select');
  const imgInput   = document.getElementById('img-input');
  const imgPreview = document.getElementById('img-preview');
  const saveBtn    = document.getElementById('save-btn');
  const saveLbl    = document.getElementById('save-lbl');
  const saveSpin   = document.getElementById('save-spin');

  let benefits = [];
  let selectedBase64 = null;

  CATEGORIES.forEach(c => {
    const o = document.createElement('option');
    o.value = o.textContent = c;
    catSelect.appendChild(o);
  });

  // דחיסת תמונה + המרה ל-Base64
  function compressToBase64(file, maxW = 800) {
    return new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          const ratio = Math.min(1, maxW / img.width);
          const canvas = document.createElement('canvas');
          canvas.width  = img.width  * ratio;
          canvas.height = img.height * ratio;
          canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
          resolve(canvas.toDataURL('image/jpeg', 0.75));
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  imgInput.addEventListener('change', async e => {
    const file = e.target.files[0];
    if (!file) return;
    imgPreview.src = URL.createObjectURL(file);
    imgPreview.classList.remove('hidden');
    selectedBase64 = await compressToBase64(file);
  });

  document.getElementById('btn-add').onclick = () => showView('add');
  document.getElementById('btn-back').onclick = () => showView('list');

  function showView(v) {
    listView.classList.toggle('hidden', v !== 'list');
    addView.classList.toggle('hidden', v !== 'add');
    if (v === 'add') resetForm();
  }

  function resetForm() {
    document.getElementById('name-inp').value = '';
    catSelect.selectedIndex = 0;
    document.getElementById('expire-inp').value = '';
    imgPreview.classList.add('hidden');
    imgPreview.src = '';
    selectedBase64 = null;
    imgInput.value = '';
  }

  saveBtn.onclick = async () => {
    const name   = document.getElementById('name-inp').value.trim();
    const cat    = catSelect.value;
    const expire = document.getElementById('expire-inp').value;
    if (!name || !expire) { alert('נא למלא שם ותאריך תפוגה'); return; }

    saveBtn.disabled = true;
    saveLbl.textContent = 'שומר…';
    saveSpin.classList.remove('hidden');

    try {
      await addDoc(collection(db, 'benefits'), {
        name, cat, expire,
        imgBase64: selectedBase64 || '',
        created: Date.now()
      });
      await loadBenefits();
      showView('list');
    } catch(err) {
      alert('שגיאה בשמירה: ' + err.message);
    } finally {
      saveBtn.disabled = false;
      saveLbl.textContent = 'שמור הטבה';
      saveSpin.classList.add('hidden');
    }
  };

  async function loadBenefits() {
    spinner.classList.remove('hidden');
    cardGrid.innerHTML = '';
    try {
      const q = query(collection(db, 'benefits'), orderBy('created', 'desc'));
      const snap = await getDocs(q);
      benefits = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderCards(benefits);
    } catch(e) {
      emptyMsg.textContent = 'שגיאה בטעינה: ' + e.message;
      emptyMsg.classList.remove('hidden');
    } finally {
      spinner.classList.add('hidden');
    }
  }

  function renderCards(list) {
    cardGrid.innerHTML = '';
    const now = Date.now();
    const soon = 48 * 60 * 60 * 1000;
    emptyMsg.classList.toggle('hidden', list.length > 0);

    list.forEach(b => {
      const expTs  = new Date(b.expire).getTime();
      const diff   = expTs - now;
      const urgent  = diff > 0 && diff < soon;
      const expired = diff < 0;

      const card = document.createElement('div');
      card.className = `rounded-2xl shadow p-4 flex flex-col gap-2 cursor-pointer transition hover:scale-[1.02]
        ${urgent ? 'card-expire border-2 border-red-400' : expired ? 'bg-gray-100 opacity-60' : 'bg-white'}`;

      const dateStr = new Date(b.expire).toLocaleDateString('he-IL');
      const badge = urgent
        ? `<span class="text-xs bg-red-100 text-red-600 rounded-full px-2 py-0.5 font-bold">⚠️ פג בקרוב!</span>`
        : expired
        ? `<span class="text-xs bg-gray-200 text-gray-500 rounded-full px-2 py-0.5">פג תוקף</span>`
        : '';

      card.innerHTML = `
        ${b.imgBase64
          ? `<img src="${b.imgBase64}" alt="ברקוד" class="w-full h-36 object-contain rounded-xl bg-gray-50"/>`
          : `<div class="w-full h-24 flex items-center justify-center bg-gray-100 rounded-xl text-4xl">🎟️</div>`}
        <div class="flex items-center justify-between gap-1 flex-wrap">
          <span class="font-bold text-gray-800 text-base">${b.name}</span>
          ${badge}
        </div>
        <div class="flex items-center justify-between text-sm text-gray-500">
          <span class="bg-indigo-50 text-indigo-700 rounded-full px-2 py-0.5 text-xs">${b.cat}</span>
          <span>תפוגה: ${dateStr}</span>
        </div>
        <button data-id="${b.id}" class="delete-btn mt-1 text-xs text-red-400 hover:text-red-600 self-end">🗑 מחק</button>
      `;

      if (b.imgBase64) {
        card.addEventListener('click', e => {
          if (e.target.classList.contains('delete-btn')) return;
          openModal(b.imgBase64);
        });
      }

      cardGrid.appendChild(card);
    });

    document.querySelectorAll('.delete-btn').forEach(btn => {
      btn.onclick = async e => {
        e.stopPropagation();
        if (!confirm('למחוק הטבה זו?')) return;
        try {
          await deleteDoc(doc(db, 'benefits', btn.dataset.id));
          await loadBenefits();
        } catch(err) { alert('שגיאה במחיקה'); }
      };
    });
  }

  searchInp.addEventListener('input', () => {
    const q = searchInp.value.trim().toLowerCase();
    renderCards(q ? benefits.filter(b => b.name.toLowerCase().includes(q)) : benefits);
  });

  function openModal(src) {
    modalImg.src = src;
    modal.classList.remove('hidden');
  }
  document.getElementById('modal-close').onclick = () => modal.classList.add('hidden');
  modal.addEventListener('click', e => { if(e.target === modal) modal.classList.add('hidden'); });

  loadBenefits();
</script>

<!-- Header -->
<header class="bg-indigo-600 text-white px-4 py-3 flex items-center justify-between shadow-lg sticky top-0 z-10">
  <h1 class="text-lg font-bold tracking-tight">🎟️ ההטבות שלי</h1>
  <button id="btn-add" class="bg-white text-indigo-600 text-sm font-bold px-3 py-1.5 rounded-xl shadow hover:bg-indigo-50 transition">+ הוסף</button>
</header>

<!-- List View -->
<div id="list-view" class="px-4 py-4 max-w-lg mx-auto">
  <input id="search" type="search" placeholder="🔍 חיפוש לפי שם מותג…"
    class="w-full rounded-xl border border-gray-200 bg-white px-4 py-2.5 text-sm shadow-sm mb-4 focus:outline-none focus:ring-2 focus:ring-indigo-300"/>
  <div id="spinner" class="hidden flex justify-center py-8"><div class="spinner"></div></div>
  <p id="empty-msg" class="hidden text-center text-gray-400 mt-12 text-sm">אין הטבות עדיין.<br/>לחץ על + הוסף כדי להתחיל 🎉</p>
  <div id="card-grid" class="grid grid-cols-1 gap-4"></div>
</div>

<!-- Add View -->
<div id="add-view" class="hidden px-4 py-4 max-w-lg mx-auto">
  <div class="bg-white rounded-2xl shadow p-5 flex flex-col gap-4">
    <div class="flex items-center gap-2 mb-1">
      <button id="btn-back" class="text-indigo-500 text-sm hover:underline">← חזור</button>
      <h2 class="font-bold text-gray-700 text-base">הוספת הטבה חדשה</h2>
    </div>
    <div>
      <label class="text-sm font-medium text-gray-600 block mb-1">שם המותג / ההטבה *</label>
      <input id="name-inp" type="text" placeholder="לדוגמה: רמי לוי"
        class="w-full rounded-xl border border-gray-200 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"/>
    </div>
    <div>
      <label class="text-sm font-medium text-gray-600 block mb-1">קטגוריה</label>
      <select id="cat-select"
        class="w-full rounded-xl border border-gray-200 px-4 py-2.5 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-indigo-300">
      </select>
    </div>
    <div>
      <label class="text-sm font-medium text-gray-600 block mb-1">תאריך תפוגה *</label>
      <input id="expire-inp" type="date"
        class="w-full rounded-xl border border-gray-200 px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"/>
    </div>
    <div>
      <label class="text-sm font-medium text-gray-600 block mb-1">תמונת ברקוד / קופון</label>
      <label class="flex items-center justify-center gap-2 w-full border-2 border-dashed border-indigo-200 rounded-xl py-4 cursor-pointer hover:bg-indigo-50 transition text-sm text-indigo-500 font-medium">
        📷 העלה תמונה או צלם
        <input id="img-input" type="file" accept="image/*" capture="environment" class="hidden"/>
      </label>
      <img id="img-preview" class="hidden mt-3 w-full max-h-48 object-contain rounded-xl border border-gray-100"/>
    </div>
    <button id="save-btn"
      class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2 transition mt-1">
      <span id="save-lbl">שמור הטבה</span>
      <div id="save-spin" class="hidden w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
    </button>
  </div>
</div>

<!-- Modal -->
<div id="modal" class="hidden fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4">
  <div class="relative max-w-sm w-full">
    <button id="modal-close" class="absolute -top-10 left-0 text-white text-3xl leading-none">&times;</button>
    <img id="modal-img" src="" alt="ברקוד" class="w-full rounded-2xl shadow-2xl bg-white"/>
    <p class="text-center text-white/70 text-xs mt-3">הצג את המסך לסריקה בקופה</p>
  </div>
</div>

</body>
</html>
